name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: darwin-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle: darwin-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: windows-x86_64

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (only applied on macOS runners)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Clearly ${{ github.ref_name }}'
          releaseBody: |
            ## Clearly ${{ github.ref_name }}

            ### Downloads
            - **macOS (Apple Silicon)** — `.dmg` (aarch64)
            - **macOS (Intel)** — `.dmg` (x86_64)
            - **Windows** — `-setup.exe` / `.msi` (x64)
            - **Linux** — `.AppImage` / `.deb`

            Existing users will receive this update automatically via the in-app update banner.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.target }}

      - name: Pack MSIX for Microsoft Store
        if: matrix.platform == 'windows-latest' && !contains(github.ref_name, '-')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'

          $version = $env:TAG.TrimStart('v')
          $msixVersion = "$version.0"
          $stage = Join-Path $env:RUNNER_TEMP 'msix-stage'
          New-Item -ItemType Directory -Force $stage | Out-Null
          New-Item -ItemType Directory -Force (Join-Path $stage 'Assets') | Out-Null

          # 1) Copy the Tauri binary. Cargo produces `clearly.exe` (lowercase);
          #    rename to `Clearly.exe` so the manifest's Executable attribute
          #    is consistent with the product name shown in Task Manager.
          $exeSrc = "src-tauri/target/${{ matrix.target }}/release/clearly.exe"
          if (-not (Test-Path $exeSrc)) {
            throw "Tauri binary not found at $exeSrc"
          }
          Copy-Item $exeSrc (Join-Path $stage 'Clearly.exe')

          # 2) Copy MSIX icons generated by `tauri icon` into Assets/.
          $iconDir = 'src-tauri/icons'
          foreach ($name in @(
            'Square44x44Logo.png',
            'Square71x71Logo.png',
            'Square150x150Logo.png',
            'Square310x310Logo.png',
            'StoreLogo.png'
          )) {
            Copy-Item (Join-Path $iconDir $name) (Join-Path $stage "Assets/$name")
          }

          # 3) Render AppxManifest.xml from template (only Version is dynamic;
          #    Publisher identity is pinned in the template).
          $manifest = Get-Content 'src-tauri/msix/AppxManifest.xml.template' -Raw
          $manifest = $manifest.Replace('__VERSION__', $msixVersion)
          Set-Content -Path (Join-Path $stage 'AppxManifest.xml') -Value $manifest -Encoding UTF8

          # 4) Locate makeappx.exe in the latest Windows 10 SDK on the runner.
          $sdkBase = 'C:\Program Files (x86)\Windows Kits\10\bin'
          $makeappx = Get-ChildItem $sdkBase -Recurse -Filter makeappx.exe |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $makeappx) { throw 'makeappx.exe not found in Windows SDK' }
          Write-Host "Using: $($makeappx.FullName)"

          # 5) Pack.
          $msixName = "Clearly_Desktop_${version}_x64.msix"
          $msixPath = Join-Path $env:RUNNER_TEMP $msixName
          & $makeappx.FullName pack /d $stage /p $msixPath /nv
          if ($LASTEXITCODE -ne 0) { throw "makeappx pack failed with exit code $LASTEXITCODE" }

          # 6) Upload to the GitHub release so it can be downloaded for
          #    Partner Center upload.
          gh release upload $env:TAG $msixPath --repo $env:REPO --clobber

  publish-updater-json:
    needs: build
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          WORK=$(mktemp -d)

          echo "Fetching release assets for $TAG..."
          gh release download "$TAG" --repo "$REPO" --dir "$WORK" --pattern "*.sig" --pattern "*.tar.gz" --pattern "*.AppImage.tar.gz*" --pattern "*-setup.exe*"

          ls -la "$WORK"

          # Helper: pick first sig matching a pattern, print its base64 contents
          sig_for() {
            local pat="$1"
            local f
            f=$(find "$WORK" -maxdepth 1 -type f -name "$pat" | head -n1 || true)
            if [[ -n "$f" ]]; then
              cat "$f"
            fi
          }

          # macOS arm64
          MAC_ARM_SIG=$(sig_for "*aarch64*.app.tar.gz.sig" || true)
          if [[ -z "$MAC_ARM_SIG" ]]; then
            MAC_ARM_SIG=$(sig_for "Clearly.app.tar.gz.sig" || true)
          fi

          # macOS x86_64
          MAC_X64_SIG=$(sig_for "*x64*.app.tar.gz.sig" || true)
          if [[ -z "$MAC_X64_SIG" ]]; then
            MAC_X64_SIG=$(sig_for "*x86_64*.app.tar.gz.sig" || true)
          fi

          # Linux AppImage
          LINUX_SIG=$(sig_for "*.AppImage.tar.gz.sig" || true)

          # Windows NSIS installer
          WIN_SIG=$(sig_for "*_x64-setup.exe.sig" || true)
          if [[ -z "$WIN_SIG" ]]; then
            WIN_SIG=$(sig_for "*-setup.exe.sig" || true)
          fi

          cat > "$WORK/latest.json" <<EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_ARM_SIG",
                "url": "https://github.com/$REPO/releases/download/$TAG/Clearly_${VERSION}_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$MAC_X64_SIG",
                "url": "https://github.com/$REPO/releases/download/$TAG/Clearly_${VERSION}_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "https://github.com/$REPO/releases/download/$TAG/clearly_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/$REPO/releases/download/$TAG/Clearly_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF

          echo "--- latest.json ---"
          cat "$WORK/latest.json"

          gh release upload "$TAG" "$WORK/latest.json" --repo "$REPO" --clobber
